<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTrust | Chat com o Técnico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/agendar-reparo.css">
</head>
<body>
    <nav class="dash-navbar">
        <div class="dash-nav-container">
            <div class="logo" onclick="window.location.href='index.html';">
                <div class="logo-icon">T</div>
                <span class="logo-text">Tech<span>Trust</span></span>
            </div>
            <div class="user-menu">
                <div class="user-profile" onclick="window.location.href='dashboard.html';">
                    <span style="color: var(--primary-blue); font-size: 14px; font-weight: 600;" cursor="pointer">← Voltar</span>
                </div>
            </div>
        </div>
    </nav>
    <div class="chat-app">
        <div class="chat-header">
            
            
            <img id="chat-tech-avatar" src="https://via.placeholder.com/150" alt="Técnico" class="tech-avatar" style="display: none;">
            <div class="tech-info">
                <h2 id="chat-tech-name">Carregando...</h2>
                <p><span class="status-dot"></span> Online</p>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message message-tech">
                <div class="message-bubble">
                    Olá! Sou o especialista que vai te ajudar hoje. Pode me explicar o que aconteceu e enviar fotos do aparelho?
                </div>
                <span class="message-time">Agora</span>
            </div>
        </div>

        <div class="input-area-wrapper">
            <div class="chat-input-container">
                <button id="btn-attach" class="btn-attach" title="Anexar foto">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
            
                <input type="file" id="file-input" accept="image/*" multiple>

                <input type="text" id="chat-input" class="chat-input" placeholder="Digite uma mensagem..." autocomplete="off">
                
                <button id="btn-send" class="btn-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Inicialização dos dados
window.addEventListener('DOMContentLoaded', () => {
    const techName = localStorage.getItem('techName');
    const techImg = localStorage.getItem('techImg');

    document.getElementById('chat-tech-name').innerText = techName ? techName : "Técnico Não Identificado";
    if (techImg) {
        const imgElement = document.getElementById('chat-tech-avatar');
        imgElement.src = techImg;
        imgElement.style.display = 'block';
    } else {
        document.getElementById('chat-tech-avatar').style.display = 'block';
        // Mostra placeholder
    }
});

const chatInput = document.getElementById('chat-input');
const btnSend = document.getElementById('btn-send');
const chatMessages = document.getElementById('chat-messages');
const btnAttach = document.getElementById('btn-attach');
const fileInput = document.getElementById('file-input');

// Função universal para injetar mensagens
function adicionarMensagem(conteudo, tipo = 'user', isImage = false) {
    if (conteudo.trim() !== "") {
        const data = new Date();
        const hora = data.getHours().toString().padStart(2, '0') + ':' + data.getMinutes().toString().padStart(2, '0');

        const novaMensagem = document.createElement('div');
        novaMensagem.classList.add('message', `message-${tipo}`);
        
        // Se for só imagem, adiciona a classe especial para tirar o padding e o "rabinho"
        const bubbleClass = isImage ? 'message-bubble bubble-image-only' : 'message-bubble';

        novaMensagem.innerHTML = `
            <div class="${bubbleClass}">${conteudo}</div>
            <span class="message-time">${hora}</span>
        `;
        chatMessages.appendChild(novaMensagem);
        chatMessages.scrollTop = chatMessages.scrollHeight; 
    }
}

// Lógica de Envio de Texto
function enviarTexto() {
    if (chatInput.value.trim() !== '') {
        adicionarMensagem(chatInput.value, 'user', false);
        chatInput.value = '';
    }
}

btnSend.addEventListener('click', enviarTexto);

chatInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') enviarTexto();
});

// Lógica de Upload de Imagem
btnAttach.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', function() {
    if (this.files && this.files.length > 0) {
        for (let i = 0; i < this.files.length; i++) {
            const file = this.files[i];

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();

                reader.onload = function(evento) {
                    const imgHTML = `<img src="${evento.target.result}" class="message-image" alt="Foto do aparelho">`;
                    // Passa 'true' no terceiro parâmetro para aplicar o estilo sem bordas
                    adicionarMensagem(imgHTML, 'user', true);
                };

                reader.readAsDataURL(file);
            }
        }
        this.value = ''; 
    }
});
    </script>
        <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>
</html>
