<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTrust | Negociação com o Técnico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/agendar-reparo.css">
</head>
<body>

    <div class="page-wrapper">
        <a href="dashboard.html" class="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Voltar
        </a>

        <div class="dashboard-container">
            
            <div class="card">
                <h2>Descreva Seu Problema</h2>
                <div class="form-group">
                    <label class="form-label">Dispositivo e Descrição do Problema</label>
                    <textarea placeholder="ex: A tela do meu iPhone 13 está trincada e não responde ao toque..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Enviar Fotos (Opcional)</label>
                    <div class="upload-area" id="upload-area">
                        <input type="file" id="file-input" accept="image/png, image/jpeg" multiple style="display: none;">
                        <svg class="upload-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span class="upload-text" id="upload-text">Clique para enviar imagens</span>
                        <span class="upload-subtext">PNG, JPG até 10MB</span>
                    </div>
                </div>
            </div>

            <div class="card chat-card">
                
                <div class="chat-header">
                    <img id="chat-tech-avatar" src="" alt="Técnico" class="tech-avatar" style="display: none;">
                    
                    <div class="tech-info">
                        <h2 id="chat-tech-name">Carregando...</h2>
                        <p><span class="status-dot"></span> Online agora</p>
                    </div>
                </div>

                <div class="chat-messages" id="chat-messages">
                    <div class="message message-tech">
                        <div class="message-bubble">
                            Olá! Ficarei feliz em ajudar com seu reparo. Pode me contar mais sobre o problema?
                        </div>
                        <span class="message-time">20:38</span>
                    </div>
                </div>

                <div class="chat-input-container">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Digite sua mensagem..." autocomplete="off">
                    <button id="btn-send" class="btn-send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // === 1. LÓGICA DE CARREGAR OS DADOS DO TÉCNICO ===
        window.addEventListener('DOMContentLoaded', () => {
            // Puxa as informações da memória que salvamos no dashboard
            const techName = localStorage.getItem('techName');
            const techImg = localStorage.getItem('techImg');

            // Se achou um nome, atualiza na tela
            if (techName) {
                document.getElementById('chat-tech-name').innerText = techName;
            } else {
                document.getElementById('chat-tech-name').innerText = "Técnico Não Identificado";
            }

            // Se achou uma imagem, mostra a tag <img> com a foto dele
            if (techImg) {
                const imgElement = document.getElementById('chat-tech-avatar');
                imgElement.src = techImg;
                imgElement.style.display = 'flex'; // Torna visível
            }
        });

        // === 2. LÓGICA DO CHAT E UPLOAD (Mantida) ===
        const chatInput = document.getElementById('chat-input');
        const btnSend = document.getElementById('btn-send');
        const chatMessages = document.getElementById('chat-messages');

        function enviarMensagem() {
            const texto = chatInput.value.trim(); 
            
            if (texto !== "") {
                const data = new Date();
                const hora = data.getHours().toString().padStart(2, '0') + ':' + data.getMinutes().toString().padStart(2, '0');

                const novaMensagem = document.createElement('div');
                novaMensagem.classList.add('message', 'message-user');
                
                novaMensagem.innerHTML = `
                    <div class="message-bubble">${texto}</div>
                    <span class="message-time">${hora}</span>
                `;

                chatMessages.appendChild(novaMensagem);
                chatInput.value = '';
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        btnSend.addEventListener('click', enviarMensagem);

        chatInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                enviarMensagem();
            }
        });

        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const uploadText = document.getElementById('upload-text');

        uploadArea.addEventListener('click', function() { fileInput.click(); });

        fileInput.addEventListener('change', function() {
            if (fileInput.files.length > 0) {
                if (fileInput.files.length === 1) {
                    uploadText.textContent = fileInput.files[0].name;
                } else {
                    uploadText.textContent = `${fileInput.files.length} arquivos selecionados`;
                }
                uploadText.style.color = 'var(--primary-blue)';
            }
        });
    </script>
</body>
</html>
